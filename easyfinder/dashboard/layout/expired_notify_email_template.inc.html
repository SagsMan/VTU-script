<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A responsive two column example</title>
    <style>
        /* A simple css reset */
        body,table,thead,tbody,tr,td,img {
            padding: 0;
            margin: 0;
            border: none;
            border-spacing: 0px;
            border-collapse: collapse;
            vertical-align: top;
        }

        /* Add some padding for small screens */
        .wrapper {
            padding-left: 10px;
            padding-right: 10px;
        }

        h1,h2,h3,h4,h5,h6,p {
            margin: 0;
            padding: 0;
            padding-bottom: 20px;
            line-height: 1.6;
            font-family: 'Helvetica', 'Arial', sans-serif;
        }

        p,a,li {
            font-family: 'Helvetica', 'Arial', sans-serif;
        }

        td img {
            width: 100%;
            display: block;
        }

        @media only screen and (max-width: 620px) {

            .wrapper .section {
                width: 100%;
            }

            .wrapper .column {
                width: 100%;
                display: block;
            }
        }
    </style>
</head>

<body>

    <table width="100%">


<p style="margin-top: 2%" align="center">
<img src="https://truedtech.com/dashboard/images/logo.png" style="text-align: center;width: 70px;"/>
</p>


        <tbody>
            <tr>
                <td class="wrapper" width="600" align="center" style="margin-top: 10%">
                    <!-- Header image -->
                    <table class="section header" cellpadding="0" cellspacing="0" width="600">
                        <tr style="border-top: thick solid green;">
                            <td class="column">
                                <table>
                                    <tbody>
                                        <tr>
                                            <td align="left">
                                                <img src="../images/school.jpg" alt="picsum" width="600" />
                                                <h2 style="text-align: center;">Welcome To TruedTech Inc.</h2>
                                                <p style="text-align:justify;">Dear {{ name }}, thanks for choosing TruedTech. You can now create website for your school and enjoy 20% discount on any of our services.</p>
                                                <h3 style="text-align:justify; text-align: center;">This is your login credentials : </h3>
                                                <p>Email/Username : {{ email }}</p>
                                                <p>Password : {{ password }}</p>

                                                <h4 style="text-align: center;">Please <a href="https://truedtech.com/dashboard"> click here</a> to login</h4>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </td>
                        </tr>
                    </table>
                  
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
